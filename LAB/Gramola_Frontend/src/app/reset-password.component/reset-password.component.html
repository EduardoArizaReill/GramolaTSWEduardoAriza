<h2>Cambiar contraseña</h2>

<p>Email: {{email}}</p>

<form (ngSubmit)="submit()">
  <input type="password" [(ngModel)]="pwd1" name="pwd1" placeholder="Nueva contraseña" required />
  <input type="password" [(ngModel)]="pwd2" name="pwd2" placeholder="Repite contraseña" required />
  <button type="submit">Cambiar</button>
</form>

<p>{{msg}}</p>
