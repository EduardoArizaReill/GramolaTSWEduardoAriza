<div class="welcome-container">
  <h1>¡Bienvenido, {{ barName }}!</h1>

  <p>
    Para ver tus playlists, primero necesitamos conectar con Spotify.
  </p>

  <button
    type="button"
    (click)="conectarSpotify()"
  >
    Conectar con Spotify
  </button>

  <p class="welcome-hint">
    Conectar no publica nada en tu cuenta, solo nos da acceso a tus playlists.
  </p>
</div>
