#
# Clase: application.properties (Perfil por defecto / MySQL)
# Atributos principales: 
# - spring.datasource.url (String) - URL JDBC a la base de datos MySQL
# - spring.datasource.username (String) - usuario de la BD
# - spring.datasource.password (String) - contraseña de la BD
# - spring.jpa.hibernate.ddl-auto (String) - estrategia de creación/actualización de tablas (update/create/create-drop)
# - spring.mail.host (String) - servidor SMTP para envío de correos
# - spring.mail.username (String) - cuenta SMTP utilizada para autenticar y enviar correos
# - spring.mail.password (String) - contraseña/app-password del SMTP
# Descripción: Archivo de configuración principal de Spring Boot para ejecutar el backend con MySQL y el servicio de correo.
# Responsabilidad: config
#
spring.application.name=Gramola_Backend

#BASE DE DATOS (ACCESO SI USAMOS SPRING)
#spring.datasource.url = jdbc:mysql://172.20.48.23:3306/gramola?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gramola?createDatabaseIfNotExist=true&serverTimezone=Europe/Madrid&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username = root
spring.datasource.password = root

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = update
server.error.include-message=always

server.port=8080
# Aparagar el h2-console
spring.h2.console.enabled=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# URL base para construir el enlace del email
app.base-url=http://localhost:8080
app.reset-path=/reset-password.html
app.reset-token-expiration-minutes=30

